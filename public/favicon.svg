<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Two things this has to survive, learned the hard way:
       1. The corners stay transparent. Filling them to stop Google Search
          painting a white frame turned the icon into a dark square in the
          Chrome tab, which is what you actually look at all day. That fix
          was a theory about Google's rendering that was never verified —
          the border may just have been Google's own chip padding, which no
          icon change can remove. The tab is real and visible; it wins.
       2. It is drawn for 16px, the size a Chrome tab renders. One device
          pixel is two units here, so nothing thinner than ~2 units
          survives — earlier 1-unit spikes resolved to half a pixel and
          vanished, leaving a blur. The 8-point diagonals are gone for the
          same reason: at 16px they were pure mush. -->
  <defs>
    <!-- The blue lives in the disc, not in a halo. It used to come from a
         wide #a8d8ff glow, but a glow big enough to colour the icon also
         drowns the spikes at 16px. Colouring the disc gets the blue back
         and leaves the star readable. -->
    <radialGradient id="bg-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2b3178"/>
      <stop offset="60%" stop-color="#1c2560"/>
      <stop offset="100%" stop-color="#141c45"/>
    </radialGradient>
    <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#a8d8ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a8d8ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Spikes hold solid white across their middle instead of fading from
         the tip. A tip-to-tip fade leaves almost nothing opaque at 16px. -->
    <linearGradient id="spike-v" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="32%" stop-color="#ffffff"/>
      <stop offset="68%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spike-h" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="32%" stop-color="#ffffff"/>
      <stop offset="68%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-width disc — no rim needed, the transparent corners give the
       edge all the contrast it needs against any tab colour. -->
  <circle cx="16" cy="16" r="16" fill="url(#bg-halo)"/>

  <!-- Tight halo. A wide one washes the spikes out at small sizes. -->
  <circle cx="16" cy="16" r="10" fill="url(#star-glow)"/>

  <!-- 4-point diffraction spikes -->
  <rect x="15" y="3.5" width="2" height="25" fill="url(#spike-v)"/>
  <rect x="3.5" y="15" width="25" height="2" fill="url(#spike-h)"/>

  <!-- Bright central core -->
  <circle cx="16" cy="16" r="3.2" fill="#ffffff"/>
</svg>
