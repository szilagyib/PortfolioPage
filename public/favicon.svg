<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sized for 16px. That is what a Chrome tab actually renders, and at
       that size one device pixel is two units here — so anything thinner
       than ~2 units disappears. The earlier 1-unit spikes and 0.7-unit rim
       resolved to half a pixel and vanished, leaving a blurry glow. Every
       element below is therefore at least 1.4 units, and the 8-point
       diagonals are gone: at 16px they only ever added mush. -->
  <defs>
    <radialGradient id="bg-halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a1640"/>
      <stop offset="60%" stop-color="#0d1230"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>
    <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#a8d8ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="rgba(168, 216, 255, 0)"/>
    </radialGradient>
    <!-- Spikes hold solid white across the middle 40% instead of fading
         from the very tip. A tip-to-tip fade leaves almost no opaque pixel
         at 16px, which is why the star used to read as a soft cross. -->
    <linearGradient id="spike-v" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="spike-h" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Opaque corners so Google Search has no transparency to render as a
       white frame, with the disc on top. The disc fades to the same colour
       as the corners, so the rim is what gives its edge back — without it
       the orb reads as a flat square. -->
  <rect width="32" height="32" fill="#06060f"/>
  <circle cx="16" cy="16" r="15" fill="url(#bg-halo)"
          stroke="rgba(168, 216, 255, 0.4)" stroke-width="1.4"/>

  <!-- Tight halo — a wide one washes the spikes out at small sizes. -->
  <circle cx="16" cy="16" r="7" fill="url(#star-glow)"/>

  <!-- 4-point diffraction spikes -->
  <rect x="15" y="3.5" width="2" height="25" fill="url(#spike-v)"/>
  <rect x="3.5" y="15" width="25" height="2" fill="url(#spike-h)"/>

  <!-- Bright central core -->
  <circle cx="16" cy="16" r="3.4" fill="#ffffff"/>
</svg>
