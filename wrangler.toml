name = "portfolio-page"
pages_build_output_dir = "dist"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

[vars]
CHAT_PROVIDER = "openai"
CHAT_MODEL = "gpt-4o-mini"
# Optional: any OpenAI-compatible endpoint (OpenRouter, Together, Groq, Ollama).
# Default is https://api.openai.com/v1. Ignored when CHAT_PROVIDER=anthropic.
# CHAT_BASE_URL = "https://openrouter.ai/api/v1"
CHAT_MAX_OUTPUT_TOKENS = "700"
CHAT_RATE_LIMIT_PER_HOUR = "10"
CHAT_RATE_LIMIT_PER_DAY = "30"
CHAT_DAILY_TOKEN_BUDGET = "200000"
ALLOWED_ORIGIN = "https://borbalaszilagyi.com,https://www.borbalaszilagyi.com"

[[kv_namespaces]]
binding = "CHAT_LIMITS"
id = "1f74f091026a4d3e8fb911d81b69c1e1"
